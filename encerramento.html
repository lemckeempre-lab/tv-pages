<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Encerramento – Zenite Anúncios</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d1117;color:#fff;font-family:-apple-system,'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  .main{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:30px;padding:40px;text-align:center}
  .row{display:flex;align-items:center;gap:60px}
  .logo-box{width:220px;height:220px;background:#0d1117;border:2px solid #FF6B00;border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;animation:pulse 2.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,0,0.35)}50%{box-shadow:0 0 0 20px rgba(255,107,0,0)}}
  .logo-icon{font-size:72px}
  .logo-nome{font-size:28px;font-weight:700;color:#FF6B00;letter-spacing:2px}
  .logo-sub{font-size:13px;color:#8b949e;letter-spacing:4px;text-transform:uppercase}
  .divider{width:2px;height:160px;background:#21262d;border-radius:1px}
  .anuncie{display:flex;flex-direction:column;align-items:center;gap:14px}
  .anuncie h2{font-size:46px;font-weight:700;color:#e6edf3;line-height:1.2}
  .anuncie h2 span{color:#FF6B00}
  .anuncie p{font-size:20px;color:#8b949e;max-width:380px;line-height:1.5}
  .contato{display:flex;flex-direction:column;gap:10px;margin-top:4px}
  .contato-item{font-size:20px;color:#c9d1d9;display:flex;align-items:center;gap:10px}
  .qr-area{display:flex;flex-direction:column;align-items:center;gap:14px}
  .qr-box{background:#fff;padding:14px;border-radius:16px;width:164px;height:164px;display:flex;align-items:center;justify-content:center}
  .qr-label{font-size:15px;color:#8b949e;text-align:center;line-height:1.5}
  .bottom{padding:14px 50px;background:#FF6B00;display:flex;justify-content:space-between;align-items:center}
  .bottom .marca{font-size:18px;font-weight:700;color:#fff;letter-spacing:1px}
  .bottom .clock{font-size:20px;font-weight:600;color:#fff;letter-spacing:2px}
</style>
</head>
<body>
<div class="main">
  <div class="row">
    <div class="logo-box">
      <div class="logo-icon">📡</div>
      <div class="logo-nome">Zenite</div>
      <div class="logo-sub">Anúncios</div>
    </div>
    <div class="divider"></div>
    <div class="anuncie">
      <h2>Anuncie<br><span>aqui</span> também!</h2>
      <p>Seu negócio visto por centenas de pessoas todos os dias</p>
      <div class="contato">
        <div class="contato-item">📱 (47) 98864-1454</div>
        <div class="contato-item">💬 WhatsApp disponível</div>
        <div class="contato-item">📍 Blumenau – SC</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="qr-area">
      <div class="qr-box">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=136x136&data=https://wa.me/5547988641454?text=Ol%C3%A1!%20Quero%20anunciar%20na%20Zenite%20An%C3%BAncios" alt="QR Code" width="136" height="136" style="border-radius:4px"/>
      </div>
      <div class="qr-label">Aponte a câmera<br>e fale conosco agora</div>
    </div>
  </div>
</div>
<div class="bottom">
  <span class="marca">Zenite Anúncios · Blumenau, SC</span>
  <span class="clock" id="clock">--:--</span>
</div>
<script>
function updateClock(){
  document.getElementById('clock').textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}
updateClock();setInterval(updateClock,1000);
</script>
</body>
</html>
